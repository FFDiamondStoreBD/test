<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InvestEarn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border-t-4 border-blue-600">
        
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Welcome Back!</h2>
            <p class="text-gray-500 mt-2">Login to your account to continue</p>
        </div>

        <!-- Flash Messages (For Error / Success alerts) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-3 mb-4 rounded text-white font-bold text-center shadow-sm
                        {% if category == 'success' %} bg-green-500
                        {% elif category == 'danger' %} bg-red-500
                        {% elif category == 'warning' %} bg-yellow-500
                        {% else %} bg-blue-500 {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-gray-700 font-bold mb-2">Email Address</label>
                <input type="email" name="email" placeholder="example@email.com" required 
                       class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">Password</label>
                <input type="password" name="password" placeholder="••••••••" required 
                       class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold text-lg hover:bg-blue-700 transition duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                Login Now
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-6 text-center">
            <p class="text-gray-600">Don't have an account? 
                <a href="/register" class="text-blue-600 font-bold hover:underline">Sign Up</a>
            </p>
        </div>
        
        <div class="mt-4 text-center">
            <a href="/" class="text-gray-400 hover:text-gray-600 text-sm flex items-center justify-center gap-1 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Home
            </a>
        </div>

    </div>

</body>
</html>
