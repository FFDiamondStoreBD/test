<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>লাকি স্পিন - Easy Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; } 
        .bg-bkash { background-color: #E2136E; }
        
        /* Premium Wheel Styling */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 0 auto; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)); }
        
        .wheel {
            width: 100%; height: 100%; border-radius: 50%; position: relative;
            background: conic-gradient(
                #EF4444 0 45deg,      /* Slot 0: 0 TK (Red) */
                #F59E0B 45deg 90deg,  /* Slot 1: 1 TK (Amber) */
                #10B981 90deg 135deg, /* Slot 2: 2 TK (Green) */
                #3B82F6 135deg 180deg,/* Slot 3: 5 TK (Blue) */
                #EF4444 180deg 225deg,/* Slot 4: 0 TK (Red) */
                #8B5CF6 225deg 270deg,/* Slot 5: 3 TK (Purple) */
                #EC4899 270deg 315deg,/* Slot 6: 10 TK (Pink) */
                #FCD34D 315deg 360deg /* Slot 7: 50 TK (Gold) */
            );
            border: 10px solid #1e293b; /* Dark Frame */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 0 6px #F59E0B; /* Golden outer ring */
            transition: transform 4.5s cubic-bezier(0.15, 0.85, 0.15, 1); /* Super smooth slow down */
        }
        
        /* Slots & Text Positioning */
        .slot {
            position: absolute; top: 0; left: 50%;
            width: 80px; height: 50%; margin-left: -40px; 
            transform-origin: 50% 100%;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 12px;
            color: white; font-weight: 900; font-size: 1.25rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            z-index: 5;
        }
        .slot span { display: block; line-height: 1.1; }
        .slot i { font-size: 0.8rem; margin-top: 2px; opacity: 0.9; }

        /* Rotate each text perfectly in the middle of its 45-degree slice */
        .slot-0 { transform: rotate(22.5deg); }
        .slot-1 { transform: rotate(67.5deg); }
        .slot-2 { transform: rotate(112.5deg); }
        .slot-3 { transform: rotate(157.5deg); }
        .slot-4 { transform: rotate(202.5deg); }
        .slot-5 { transform: rotate(247.5deg); }
        .slot-6 { transform: rotate(292.5deg); }
        .slot-7 { transform: rotate(337.5deg); color: #78350f !important; text-shadow: none !important; } /* 50TK Dark Gold Text */

        /* Pointer */
        .pointer {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 45px solid #F59E0B; /* Golden Arrow */
            z-index: 20; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.4));
        }
        
        /* Center Hub */
        .center-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: #1e293b; border-radius: 50%;
            border: 5px solid #F59E0B; z-index: 10;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
        }
        .center-circle::after {
            content: "SPIN"; font-size: 0.7rem; font-weight: 900; color: #F59E0B; letter-spacing: 1px;
        }
        
        /* Lights decoration */
        .lights { position: absolute; inset: -14px; border-radius: 50%; border: 4px dotted rgba(255,255,255,0.3); animation: spin-lights 10s linear infinite; z-index: 1; pointer-events: none; }
        @keyframes spin-lights { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <!-- Top App Bar -->
    <div class="bg-gray-900 border-b border-gray-800 px-5 py-4 flex justify-between items-center z-20 relative shadow-md">
        <a href="/dashboard" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center text-gray-300 hover:text-white transition active:scale-95">
            <i class="fa-solid fa-arrow-left text-lg"></i>
        </a>
        <h1 class="text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-400">লাকি স্পিন</h1>
        <div class="bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700 flex items-center gap-1">
            <i class="fa-solid fa-wallet text-green-400 text-xs"></i>
            <span id="user-balance" class="font-bold text-sm">৳ {{ user.balance }}</span>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 py-10 relative z-30 text-center">
        
        <h2 class="text-3xl font-black text-white mb-2 drop-shadow-md">ভাগ্য পরীক্ষা করুন!</h2>
        <p class="text-gray-400 font-semibold text-sm mb-12">প্রতি ২৪ ঘণ্টায় একবার চাকা ঘুরিয়ে জিতে নিন সর্বোচ্চ <strong class="text-yellow-400">৳৫০</strong> পর্যন্ত ফ্রি ব্যালেন্স।</p>

        <!-- Spin Wheel Component -->
        <div class="wheel-container mb-16">
            <div class="pointer"></div>
            <div class="lights"></div>
            <div class="wheel" id="wheel">
                <!-- 8 Slots mapping to the backend probabilities -->
                <div class="slot slot-0"><span>0৳</span><i class="fa-regular fa-face-frown"></i></div>
                <div class="slot slot-1"><span>1৳</span></div>
                <div class="slot slot-2"><span>2৳</span></div>
                <div class="slot slot-3"><span>5৳</span></div>
                <div class="slot slot-4"><span>0৳</span><i class="fa-regular fa-face-frown"></i></div>
                <div class="slot slot-5"><span>3৳</span></div>
                <div class="slot slot-6"><span>10৳</span><i class="fa-solid fa-coins"></i></div>
                <div class="slot slot-7"><span>50৳</span><i class="fa-solid fa-crown text-amber-700"></i></div>
            </div>
            <div class="center-circle"></div>
        </div>

        <!-- Timer & Spin Button -->
        <div id="spin-area" class="relative z-40">
            <button id="spin-btn" onclick="startSpin()" class="bg-gradient-to-r from-yellow-500 via-orange-500 to-yellow-600 text-gray-900 px-10 py-4 rounded-full font-black text-xl shadow-[0_0_20px_rgba(245,158,11,0.5)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3 mx-auto w-full max-w-[280px] border-b-4 border-orange-700 uppercase tracking-widest">
                <i class="fa-solid fa-dharmachakra"></i> ঘুরাতে ট্যাপ করুন
            </button>

            <!-- Countdown Box -->
            <div id="timer-box" class="hidden bg-gray-800 text-gray-300 px-6 py-4 rounded-2xl font-bold text-lg border border-gray-700 items-center justify-center gap-3 mx-auto w-full max-w-[280px] shadow-inner">
                <i class="fa-solid fa-clock text-yellow-500 animate-pulse text-xl"></i> 
                <span id="countdown" class="tracking-widest font-mono text-xl">00:00:00</span>
            </div>
            <p id="timer-msg" class="hidden text-gray-500 text-xs font-bold mt-3">পরবর্তী স্পিনের জন্য অপেক্ষা করুন</p>
        </div>

    </div>

    <!-- Sound Effect (Optional browser ping) -->
    <audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <script>
        const nextClaimStr = "{{ next_spin_time }}";
        const nextClaimTime = new Date(nextClaimStr).getTime();
        const spinBtn = document.getElementById('spin-btn');
        const timerBox = document.getElementById('timer-box');
        const timerMsg = document.getElementById('timer-msg');
        const countdownEl = document.getElementById('countdown');
        const wheel = document.getElementById('wheel');
        const spinSound = document.getElementById('spinSound');
        
        let currentRotation = 0;
        let isSpinning = false;

        // Timer Logic
        const updateTimer = setInterval(function() {
            const now = new Date().getTime();
            const distance = nextClaimTime - now;

            if (distance <= 0) {
                spinBtn.classList.remove('hidden');
                timerBox.classList.add('hidden');
                timerBox.classList.remove('flex');
                timerMsg.classList.add('hidden');
                clearInterval(updateTimer);
            } else {
                spinBtn.classList.add('hidden');
                timerBox.classList.remove('hidden');
                timerBox.classList.add('flex');
                timerMsg.classList.remove('hidden');
                
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);
                countdownEl.innerHTML = (h<10?"0"+h:h) + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);
            }
        }, 1000);

        // Spin Logic
        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> অপেক্ষা করুন...";
            spinBtn.disabled = true;
            spinBtn.classList.add('opacity-80');

            // API Call to Python Backend
            fetch('/api/spin_reward', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    Swal.fire({ icon: 'error', title: 'দুঃখিত!', text: data.error, background: '#1e293b', color: '#fff', confirmButtonColor: '#E2136E' });
                    isSpinning = false;
                    return;
                }

                // Play Sound
                spinSound.volume = 0.5;
                spinSound.play().catch(e => console.log('Audio auto-play blocked'));

                // Physics/Math of the Spin:
                // We have 8 slots. Each slot is 45 degrees.
                // Target slot index comes from backend (0 to 7).
                const sliceIndex = data.slot_index;
                
                // Formula to land the specific slot precisely at the top (under the pointer)
                // Offset = 360 - (Slice Center Degree). Slice Center = (Index * 45) + 22.5
                const offset = 360 - (sliceIndex * 45 + 22.5);
                
                // 10 Full extra spins + offset for the target slot
                const extraSpins = 10 * 360; 
                
                // Calculate final rotation degrees (ensuring it rotates forward from current position)
                const finalRotation = currentRotation + extraSpins + offset - (currentRotation % 360);
                
                // Execute CSS animation
                currentRotation = finalRotation;
                wheel.style.transform = `rotate(${finalRotation}deg)`;

                // Wait 4.5 seconds for animation to finish
                setTimeout(() => {
                    // Update header balance
                    const currentBal = parseFloat(document.getElementById('user-balance').innerText.replace('৳ ', ''));
                    document.getElementById('user-balance').innerText = '৳ ' + (currentBal + data.reward);
                    
                    // Show Result Alert
                    if(data.reward > 0) {
                        Swal.fire({ 
                            icon: 'success', title: 'দারুণ!', text: data.message, 
                            background: '#1e293b', color: '#fff', confirmButtonColor: '#F59E0B'
                        }).then(() => location.reload());
                    } else {
                        Swal.fire({ 
                            icon: 'error', title: 'ইসস!', text: data.message, 
                            background: '#1e293b', color: '#fff', confirmButtonColor: '#EF4444'
                        }).then(() => location.reload());
                    }
                }, 4600);
            });
        }
    </script>
</body>
</html>
