<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ডেইলি স্পিন - Easy Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f4f6f9; } 
        .bg-bkash { background-color: #E2136E; }
        
        /* Spin Wheel Animation */
        .wheel-container { position: relative; width: 250px; height: 250px; margin: 0 auto; }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(#E2136E 0 60deg, #FBBF24 60deg 120deg, #3B82F6 120deg 180deg, #10B981 180deg 240deg, #8B5CF6 240deg 300deg, #F43F5E 300deg 360deg);
            border: 8px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #E2136E; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 10;
        }
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid #1f2937; z-index: 20;
        }
    </style>
</head>
<body class="text-gray-800 antialiased pb-24">

    <!-- Header -->
    <div class="bg-bkash text-white px-5 pt-6 pb-8 rounded-b-[2rem] shadow-lg relative z-20">
        <div class="flex justify-between items-center mb-4">
            <a href="/dashboard" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md transition active:scale-95"><i class="fa-solid fa-arrow-left text-lg"></i></a>
            <h1 class="text-xl font-extrabold tracking-wide">ডেইলি স্পিন</h1>
            <div class="w-10"></div>
        </div>
        <div class="text-center">
            <p class="text-pink-200 text-sm font-semibold mb-1">আপনার বর্তমান ব্যালেন্স</p>
            <h1 id="user-balance" class="text-3xl font-black">৳ {{ user.balance }}</h1>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 py-8 relative z-30 text-center">
        
        <h2 class="text-2xl font-black text-gray-800 mb-2">ভাগ্য পরীক্ষা করুন!</h2>
        <p class="text-gray-500 font-semibold text-sm mb-8">প্রতি ২৪ ঘণ্টায় একবার চাকা ঘুরিয়ে জিতে নিন ফ্রি ব্যালেন্স।</p>

        <!-- Spin Wheel -->
        <div class="wheel-container mb-10">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="wheel-center">SPIN</div>
        </div>

        <!-- Timer / Spin Button -->
        <div id="spin-area">
            <button id="spin-btn" onclick="startSpin()" class="bg-gradient-to-r from-orange-500 to-yellow-500 text-white px-10 py-4 rounded-full font-black text-lg shadow-lg hover:scale-105 active:scale-95 transition flex items-center justify-center gap-2 mx-auto w-full max-w-[250px] border-b-4 border-orange-600">
                <i class="fa-solid fa-dharmachakra"></i> চাকা ঘুরান
            </button>
            <div id="timer-box" class="hidden bg-gray-100 text-gray-600 px-6 py-4 rounded-2xl font-bold text-lg border border-gray-200 inline-flex items-center justify-center gap-2 mx-auto w-full max-w-[250px]">
                <i class="fa-solid fa-clock text-yellow-500 animate-pulse"></i> 
                <span id="countdown">00:00:00</span>
            </div>
        </div>

    </div>

    <script>
        const nextClaimStr = "{{ next_spin_time }}";
        const nextClaimTime = new Date(nextClaimStr).getTime();
        const spinBtn = document.getElementById('spin-btn');
        const timerBox = document.getElementById('timer-box');
        const countdownEl = document.getElementById('countdown');
        let isSpinning = false;

        // Check Timer
        const updateTimer = setInterval(function() {
            const now = new Date().getTime();
            const distance = nextClaimTime - now;

            if (distance <= 0) {
                spinBtn.classList.remove('hidden');
                timerBox.classList.add('hidden');
                clearInterval(updateTimer);
            } else {
                spinBtn.classList.add('hidden');
                timerBox.classList.remove('hidden');
                timerBox.classList.add('flex');
                
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);
                countdownEl.innerHTML = (h<10?"0"+h:h) + ":" + (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);
            }
        }, 1000);

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> দয়া করে অপেক্ষা করুন...";
            spinBtn.disabled = true;

            // API Call
            fetch('/api/spin_reward', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    Swal.fire({ icon: 'error', title: 'দুঃখিত!', text: data.error, confirmButtonColor: '#E2136E' });
                    isSpinning = false;
                    return;
                }

                // UI Spin Animation
                const wheel = document.getElementById('wheel');
                const randomDeg = Math.floor(Math.random() * 360) + 3600; // Spin 10 times
                wheel.style.transform = `rotate(${randomDeg}deg)`;

                setTimeout(() => {
                    // Update Balance & Show Success
                    if(data.reward > 0) {
                        const currentBal = parseFloat(document.getElementById('user-balance').innerText.replace('৳ ', ''));
                        document.getElementById('user-balance').innerText = '৳ ' + (currentBal + data.reward);
                        Swal.fire({ icon: 'success', title: 'অভিনন্দন!', text: data.message, confirmButtonColor: '#10B981' })
                        .then(() => location.reload());
                    } else {
                        Swal.fire({ icon: 'info', title: 'ইসস!', text: data.message, confirmButtonColor: '#F59E0B' })
                        .then(() => location.reload());
                    }
                }, 3000); // Wait for wheel to stop
            });
        }
    </script>
</body>
</html>
